name: KUB flow daily worker

on:
  schedule:
    - cron: "10 3 * * *"   # 03:10 UTC = 10:10 Asia/Bangkok, once a day
  workflow_dispatch: {}     # manual "Run workflow" button

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: kub-flow
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install openpyxl     # for the KUB_Holders_Daily.xlsx viewer sheet

      # Raw per-day activity address sets are privacy-sensitive, so they are NEVER
      # committed to the (public) repo. They live only here, in the Actions cache,
      # so the 7-day rolling window survives between runs. restore-keys grabs the
      # most recent previous cache; each run saves a fresh entry under its run id.
      - name: Restore activity state (private cache, not published)
        uses: actions/cache/restore@v4
        with:
          path: |
            activity_days
            activity_state.json
          key: kub-activity-${{ github.run_id }}
          restore-keys: |
            kub-activity-

      - name: Holders — daily EOA summary (native + KKUB, excl. CEX/Fund/Reserve)
        run: python3 daily_summary.py

      - name: Active wallets — 7-day on-chain activity (unique EOA + top contracts)
        env:
          ACT_MAX_PAGES: "1500"       # first run seeds ~2 days fast; the 7-day window fills over the following days
        run: |
          python3 fetch_activity.py
          python3 build_activity.py

      - name: Flow — daily CEX net + order-book depth + on-chain DEX net
        run: python3 fetch_flow.py

      - name: Save activity state (private cache)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            activity_days
            activity_state.json
          key: kub-activity-${{ github.run_id }}

      - name: Commit fresh aggregate data
        run: |
          git config user.name  "kub-flow-bot"
          git config user.email "actions@github.com"
          git add flow_data.js flow_state.json \
                  daily_summary.csv daily_data.js KUB_Holders_Daily.xlsx \
                  activity_data.js
          if git diff --cached --quiet; then
            echo "no change today"
          else
            git commit -m "data: $(date -u +%F) — flow + holders + activity"
            git push
          fi

      # upload-pages-artifact ignores .gitignore and publishes whatever is on disk,
      # so remove the privacy-sensitive raw address sets (restored from cache) before
      # publishing. They remain safe in the Actions cache for the next run.
      - name: Strip private files from the published artifact
        run: rm -rf activity_days activity_state.json __pycache__ ./*.log

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: run
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
